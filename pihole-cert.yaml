apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pihole-cert
  namespace: pihole
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  secretName: pihole-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - pihole.local
